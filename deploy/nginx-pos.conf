server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Docker embedded DNS + a variable upstream so nginx boots even if `api` isn't
  # up yet (resolves per-request instead of failing at config load).
  resolver 127.0.0.11 valid=10s ipv6=off;
  set $api_upstream api:3001;

  # Same-origin API: the SPA calls /api/v1/... and we forward to the API service.
  location /api/ {
    proxy_pass http://$api_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
