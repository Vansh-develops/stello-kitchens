# ─────────────────────────────────────────────────────────────────────────────
# HOST nginx vhost — Stello Kitchens diner "Scan & Order" PWA.
#
# Serves the customer-facing ordering app from order.stellotechs.com. A diner
# scans a table QR (order.stellotechs.com/t/<token>) and it opens here. The
# order container (:18085) is an nginx serving the static Vite build with SPA
# fallback and self-proxying /api/v1 to the API — so this host vhost just
# forwards everything to that port.
#
# PREREQUISITE: a DNS A record  order.stellotechs.com -> 223.239.128.54  must
# exist and resolve before certbot can issue the TLS cert.
#
# Install (server admin):
#   sudo cp /webserver/vansh/stello-kitchen/deploy/nginx-host-order.conf \
#           /etc/nginx/sites-available/order.stellotechs.com
#   sudo ln -s /etc/nginx/sites-available/order.stellotechs.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d order.stellotechs.com
# ─────────────────────────────────────────────────────────────────────────────

server {
  listen 80;
  server_name order.stellotechs.com;
  client_max_body_size 10m;

  location / {
    proxy_pass http://127.0.0.1:18085;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
