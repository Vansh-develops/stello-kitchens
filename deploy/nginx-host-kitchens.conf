# ─────────────────────────────────────────────────────────────────────────────
# HOST nginx vhost — Stello Kitchens unified STAFF app on a single subdomain.
#
# This serves the whole staff product (login → POS / KDS / Console) from
# kitchens.stellotechs.com. The Next.js app on :18082 self-proxies /api, so no
# separate api. subdomain is required; /socket.io is routed straight to the API
# on :18081 for a native WebSocket upgrade (the live KDS board).
#
# NOTE: the diner order PWA (:18085) and connector webhooks (:18086) are NOT
# covered here — give each its own subdomain + block when you want them public.
#
# This file is NOT applied by the deploy (the deploy never touches host nginx).
# The server admin installs it:
#   sudo cp /webserver/vansh/stello-kitchen/deploy/nginx-host-kitchens.conf \
#           /etc/nginx/sites-available/kitchens.stellotechs.com
#   sudo ln -s /etc/nginx/sites-available/kitchens.stellotechs.com \
#              /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d kitchens.stellotechs.com
# ─────────────────────────────────────────────────────────────────────────────

# Uniquely-named map var so it can't clash with a connection_upgrade map that
# another vhost (jitsi/matrix/etc.) may already declare at http{} scope.
map $http_upgrade $stello_conn_upgrade { default upgrade; '' close; }

server {
  listen 80;
  server_name kitchens.stellotechs.com;
  client_max_body_size 20m;

  # KDS live board — native WebSocket upgrade straight to the API.
  location /socket.io/ {
    proxy_pass http://127.0.0.1:18081;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $stello_conn_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600s;
  }

  # Everything else — the unified Next.js staff app (self-proxies /api).
  location / {
    proxy_pass http://127.0.0.1:18082;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $stello_conn_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
